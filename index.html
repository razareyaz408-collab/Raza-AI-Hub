<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raza AI Hub</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<header>
  <div class="logo">
    <i class="fa-solid fa-wand-magic-sparkles"></i>
    <span>Raza AI Hub</span>
  </div>

  <button id="themeBtn">
    <i class="fa-solid fa-moon"></i>
  </button>
</header>

<section class="hero">

<h1>AI Image Generator</h1>

<p>
Create AI Images using English, Hindi, Urdu, Arabic and many other languages.
</p>

</section>

<section class="card">

<textarea
id="prompt"
placeholder="Example:
A beautiful mosque at sunset, realistic, ultra detailed">
</textarea>

<button id="generateBtn">
<i class="fa-solid fa-image"></i>
Generate Image
</button>

</section>

<section class="result">

<div id="loading" class="hidden">

<div class="loader"></div>

<p>Generating image...</p>

</div>

<img id="resultImage" alt="Generated Image">

<a id="downloadBtn" class="hidden" download>
Download Image
</a>

</section>

<footer>

© 2026 Raza AI Hub

</footer>

<script src="app.js"></script>

</body>
</html>
