<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Raza AI Image Generator</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<header>

<div class="logo">

<i class="fa-solid fa-wand-magic-sparkles"></i>

<span>Raza AI</span>

</div>

<button id="themeBtn">

<i class="fa-solid fa-moon"></i>

</button>

</header>

<section class="hero">

<h1>
AI Image Generator
</h1>

<p>
Create beautiful AI images from any language.
Hindi • Urdu • English • Arabic • Bengali • Any Language
</p>

</section>

<section class="generator">

<div class="box">

<textarea
id="prompt"
placeholder="Describe your image...
Example:
A beautiful mosque at sunset, realistic 8K, ultra detailed">
</textarea>

<div class="options">

<select id="size">

<option value="1024x1024">
1024 × 1024
</option>

<option value="1024x1792">
Portrait
</option>

<option value="1792x1024">
Landscape
</option>

</select>

<select id="quality">

<option value="hd">
HD Quality
</option>

<option value="standard">
Standard
</option>

</select>

</div>

<button id="generateBtn">

<i class="fa-solid fa-image"></i>

Generate Image

</button>

</div>

</section>

<section class="result">

<div id="loading" class="hidden">

<div class="loader"></div>

<p>Generating AI Image...</p>

</div>

<div id="imageContainer">

<img
id="resultImage"
src=""
alt="Generated Image">

</div>

<div class="downloadArea hidden"
id="downloadArea">

<a
id="downloadBtn"
download>

<i class="fa-solid fa-download"></i>

Download Image

</a>

</div>

</section>

<footer>

<p>

© 2026 Raza AI Image Generator

</p>

</footer>

<script src="app.js"></script>

</body>

</html>
